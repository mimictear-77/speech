<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>收钱吧 · 路演工坊</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --y:#E8A000;--y-deep:#C88500;--y-soft:#FFB826;
  --yl:#FFF8E8;--yl2:#FFF3D6;--ym:#FFE0A8;
  --t1:#1D1D1F;--t2:#6E6E73;--t3:#AEAEB2;--t4:#C7C7CC;
  --bg:#fff;--bg2:#F5F5F7;--bg3:#FAFAFB;
  --bd:#E5E5EA;--bd2:#EFEFF1;
  --r:14px;--rs:10px;
  --sh-sm:0 1px 2px rgba(15,15,20,.04),0 1px 3px rgba(15,15,20,.03);
  --sh-md:0 4px 14px rgba(15,15,20,.05),0 2px 4px rgba(15,15,20,.04);
  --sh-lg:0 14px 34px rgba(15,15,20,.07),0 4px 12px rgba(15,15,20,.04);
  --sh-y:0 6px 20px rgba(232,160,0,.22),0 2px 6px rgba(232,160,0,.14);
  --sh-y-lg:0 12px 30px rgba(232,160,0,.3),0 4px 10px rgba(232,160,0,.18);
  --ease:cubic-bezier(.4,0,.2,1);
  --ease-out:cubic-bezier(.2,.8,.2,1);
}
html,body{min-height:100vh}
body{
  font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;
  background:
    radial-gradient(ellipse 900px 600px at 50% -8%, rgba(232,160,0,.06), transparent 60%),
    radial-gradient(ellipse 700px 500px at 100% 110%, rgba(232,160,0,.04), transparent 65%),
    var(--bg);
  background-attachment:fixed;
  color:var(--t1);
  -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
  text-rendering:optimizeLegibility;
}
/* Header */
.hd{position:fixed;top:0;left:0;right:0;height:60px;background:rgba(255,255,255,.72);backdrop-filter:saturate(180%) blur(24px);-webkit-backdrop-filter:saturate(180%) blur(24px);border-bottom:1px solid rgba(229,229,234,.6);display:flex;align-items:center;justify-content:space-between;padding:0 24px;z-index:100}
.logo{font-size:17px;font-weight:700;letter-spacing:-.3px}
.logo em{color:var(--y);font-style:normal}
.pb{position:fixed;top:60px;left:0;right:0;height:3px;background:rgba(245,245,247,.7);z-index:99;overflow:hidden}
.pf{height:100%;background:linear-gradient(90deg,var(--y) 0%,#FFC53D 60%,#FFD66B 100%);box-shadow:0 0 12px rgba(232,160,0,.4);transition:width .6s var(--ease-out);border-radius:0 2px 2px 0}
.steps{display:flex;gap:6px;align-items:center}
.sd{width:6px;height:6px;border-radius:50%;background:var(--bd);transition:all .35s var(--ease-out)}
.sd.on{background:var(--y);width:22px;border-radius:3px;box-shadow:0 0 0 3px rgba(232,160,0,.15)}
.sd.ok{background:var(--y);opacity:.4}
/* Main */
.main{padding-top:75px;min-height:100vh}
/* Toast */
.toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(29,29,31,.94);backdrop-filter:blur(8px);color:#fff;padding:11px 20px;border-radius:100px;font-size:13px;font-weight:500;opacity:0;transition:all .3s var(--ease-out);z-index:200;white-space:nowrap;pointer-events:none;box-shadow:var(--sh-lg)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
/* Fade in */
@keyframes fi{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.fi{animation:fi .45s var(--ease-out)}
/* Setup */
.setup{max-width:580px;margin:0 auto;padding:64px 24px 48px;text-align:center}
.badge{display:inline-block;background:linear-gradient(135deg,var(--yl),var(--yl2));color:var(--y-deep);font-size:12px;font-weight:700;padding:6px 14px;border-radius:100px;margin-bottom:24px;letter-spacing:.4px;box-shadow:0 1px 2px rgba(232,160,0,.08),inset 0 0 0 1px rgba(232,160,0,.12)}
.setup h1{font-size:46px;font-weight:700;letter-spacing:-1.2px;line-height:1.08;margin-bottom:16px;background:linear-gradient(180deg,var(--t1) 30%,#3A3A3C);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.setup p{font-size:16px;color:var(--t2);line-height:1.65;margin-bottom:44px}
.fg{text-align:left;margin-bottom:20px}
.fl{display:block;font-size:13px;font-weight:600;margin-bottom:8px;color:var(--t1)}
.fi-input{width:100%;padding:14px 16px;border:1.5px solid var(--bd);border-radius:var(--rs);font-size:15px;font-family:inherit;color:var(--t1);background:var(--bg);transition:border-color .2s var(--ease),box-shadow .2s var(--ease);outline:none}
.fi-input:hover{border-color:var(--t4)}
.fi-input:focus{border-color:var(--y);box-shadow:0 0 0 4px rgba(232,160,0,.12)}
.fi-input::placeholder{color:var(--t3)}
textarea.fi-input{resize:none;height:88px;line-height:1.55}
.btn{width:100%;padding:16px;background:linear-gradient(180deg,var(--y),var(--y-deep));color:#fff;border:none;border-radius:var(--rs);font-size:16px;font-weight:600;cursor:pointer;transition:transform .15s var(--ease),box-shadow .25s var(--ease),opacity .2s;font-family:inherit;margin-top:8px;box-shadow:var(--sh-y);letter-spacing:.2px}
.btn:hover{transform:translateY(-1px);box-shadow:var(--sh-y-lg)}
.btn:active{transform:translateY(0) scale(.99)}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}
.adv-t{font-size:12px;color:var(--t3);cursor:pointer;text-align:center;margin-top:18px;padding:8px;transition:color .2s}
.adv-t:hover{color:var(--t2)}
.adv-p{display:none;margin-top:14px;padding:18px;background:var(--bg2);border-radius:var(--rs);text-align:left;border:1px solid var(--bd2)}
.adv-p.open{display:block;animation:fi .3s var(--ease-out)}
.adv-p .fg{margin-bottom:14px}
.adv-p .fl{font-size:12px}
.adv-p .fi-input{font-size:13px;padding:11px 13px}
/* Chat */
.chat{max-width:720px;margin:0 auto;padding:28px 24px 140px}
.sh{margin-bottom:32px}
.sn{font-size:11px;font-weight:700;color:var(--y-deep);text-transform:uppercase;letter-spacing:1.4px;margin-bottom:8px;display:inline-flex;align-items:center;gap:8px}
.sn::before{content:'';display:inline-block;width:18px;height:1.5px;background:linear-gradient(90deg,var(--y),transparent);border-radius:1px}
.st{font-size:28px;font-weight:700;letter-spacing:-.5px;line-height:1.2}
.sd2{font-size:14.5px;color:var(--t2);margin-top:8px;line-height:1.55}
/* Context card */
.ctx{background:linear-gradient(135deg,var(--yl),#FFFAEC);border:1px solid rgba(232,160,0,.18);border-radius:var(--rs);padding:14px 18px;margin-bottom:22px;font-size:14px;line-height:1.55;box-shadow:0 1px 3px rgba(232,160,0,.05)}
.ctx strong{color:var(--y-deep);font-size:11px;display:block;margin-bottom:5px;letter-spacing:.6px;text-transform:uppercase;font-weight:700}
/* Messages */
.msgs{display:flex;flex-direction:column;gap:16px}
@keyframes si{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg{display:flex;gap:11px;animation:si .35s var(--ease-out)}
.msg.u{flex-direction:row-reverse}
.av{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--yl),var(--ym));display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;font-weight:700;color:var(--y-deep);box-shadow:0 1px 3px rgba(0,0,0,.04)}
.msg.u .av{background:linear-gradient(135deg,var(--y),var(--y-deep));color:#fff;font-size:13px;box-shadow:0 2px 6px rgba(232,160,0,.25)}
.bub{max-width:78%;padding:13px 17px;border-radius:18px;font-size:15px;line-height:1.65;box-shadow:var(--sh-sm)}
.msg.ai .bub{background:var(--bg2);border-radius:6px 18px 18px 18px}
.msg.u .bub{background:linear-gradient(135deg,var(--y),var(--y-deep));color:#fff;border-radius:18px 6px 18px 18px;box-shadow:0 4px 14px rgba(232,160,0,.22)}
.msg.out .bub{background:linear-gradient(135deg,var(--yl),#FFFAEC);border:1.5px solid rgba(232,160,0,.22);border-radius:14px;max-width:100%;padding:18px 22px;box-shadow:0 2px 12px rgba(232,160,0,.06)}
/* Loading */
.ld{display:flex;gap:5px;padding:14px 18px;background:var(--bg2);border-radius:6px 18px 18px 18px;width:fit-content}
.ld-d{width:7px;height:7px;border-radius:50%;background:var(--t3);animation:bounce 1.4s infinite}
.ld-d:nth-child(2){animation-delay:.18s}.ld-d:nth-child(3){animation-delay:.36s}
@keyframes bounce{0%,80%,100%{transform:translateY(0);opacity:.5}40%{transform:translateY(-6px);opacity:1}}
/* Input area */
.ia{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.85);backdrop-filter:saturate(180%) blur(24px);-webkit-backdrop-filter:saturate(180%) blur(24px);border-top:1px solid rgba(229,229,234,.7);padding:14px 20px 18px}
.ic{max-width:720px;margin:0 auto;display:flex;gap:10px;align-items:flex-end}
.ci{flex:1;padding:13px 16px;border:1.5px solid var(--bd);border-radius:14px;font-size:15px;font-family:inherit;color:var(--t1);background:var(--bg);resize:none;outline:none;min-height:48px;max-height:140px;line-height:1.5;transition:border-color .2s var(--ease),box-shadow .2s var(--ease)}
.ci:hover{border-color:var(--t4)}
.ci:focus{border-color:var(--y);box-shadow:0 0 0 4px rgba(232,160,0,.1)}
.sb{width:48px;height:48px;background:linear-gradient(135deg,var(--y),var(--y-deep));border:none;border-radius:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform .15s var(--ease),box-shadow .25s var(--ease),opacity .2s;box-shadow:var(--sh-y)}
.sb:hover{transform:translateY(-1px);box-shadow:var(--sh-y-lg)}
.sb:active{transform:translateY(0) scale(.97)}
.sb:disabled{opacity:.35;cursor:not-allowed;transform:none;box-shadow:none}
/* Next button */
.nb{display:inline-flex;align-items:center;gap:8px;padding:14px 24px;background:linear-gradient(180deg,#2C2C2E,var(--t1));color:#fff;border:none;border-radius:var(--rs);font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;transition:transform .15s var(--ease),box-shadow .25s var(--ease);margin-top:24px;box-shadow:0 4px 14px rgba(0,0,0,.12);letter-spacing:.2px}
.nb:hover{transform:translateY(-1px);box-shadow:0 8px 22px rgba(0,0,0,.18)}
.nb:active{transform:translateY(0) scale(.99)}
/* Gen loading */
.gl{text-align:center;padding:64px 0}
.gl .ld{margin:0 auto}
.gl p{margin-top:16px;color:var(--t3);font-size:13px}
/* Complete */
.cpl{max-width:720px;margin:0 auto;padding:60px 24px 64px}
.cpl-hd{text-align:center;margin-bottom:48px}
.cpl-ic{width:64px;height:64px;background:linear-gradient(135deg,var(--yl),var(--ym));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 20px;color:var(--y-deep);box-shadow:0 6px 20px rgba(232,160,0,.18)}
.cpl h1{font-size:32px;font-weight:700;letter-spacing:-.6px;margin-bottom:10px;background:linear-gradient(180deg,var(--t1) 30%,#3A3A3C);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.cpl .sub{font-size:16px;color:var(--t2)}
.act{display:flex;gap:10px;margin-top:26px;justify-content:center;flex-wrap:wrap}
.btn2{padding:13px 22px;background:var(--bg2);color:var(--t1);border:1px solid var(--bd2);border-radius:var(--rs);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s var(--ease)}
.btn2:hover{background:var(--bg);border-color:var(--t4);transform:translateY(-1px);box-shadow:var(--sh-sm)}
.btn3{padding:13px 22px;background:linear-gradient(180deg,var(--y),var(--y-deep));color:#fff;border:none;border-radius:var(--rs);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:transform .15s var(--ease),box-shadow .25s var(--ease);box-shadow:var(--sh-y)}
.btn3:hover{transform:translateY(-1px);box-shadow:var(--sh-y-lg)}
.btn3:active{transform:translateY(0) scale(.99)}
.rs{background:var(--bg);border:1px solid var(--bd2);border-radius:var(--r);padding:24px 26px;margin-bottom:14px;box-shadow:var(--sh-sm);transition:box-shadow .25s var(--ease),transform .15s var(--ease)}
.rs:hover{box-shadow:var(--sh-md);transform:translateY(-1px)}
.rs-t{font-size:11px;font-weight:700;color:var(--y-deep);text-transform:uppercase;letter-spacing:.7px;margin-bottom:12px;display:inline-flex;align-items:center;gap:6px}
.rs-t::before{content:'';display:inline-block;width:14px;height:1.5px;background:var(--y);border-radius:1px}
.rs-c{font-size:14.5px;line-height:1.78;white-space:pre-wrap;color:#3A3A3C}
/* hint */
.hint{font-size:12px;color:var(--t3);margin-top:7px;line-height:1.5}
/* Back button */
.backBtn{display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,.6);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:1px solid var(--bd);color:var(--t2);font-size:13px;cursor:pointer;padding:7px 14px;margin-bottom:16px;font-family:inherit;border-radius:100px;transition:all .2s var(--ease)}
.backBtn:hover{background:var(--bg);color:var(--t1);border-color:var(--t4);transform:translateX(-2px)}
.backBtn:disabled{opacity:.4;cursor:not-allowed;transform:none}
/* Mobile */
@media(max-width:600px){
  .setup{padding:48px 20px 40px}
  .setup h1{font-size:36px;letter-spacing:-1px}
  .setup p{font-size:15px;margin-bottom:36px}
  .chat{padding:22px 18px 130px}
  .st{font-size:23px}
  .sd2{font-size:14px}
  .bub{max-width:88%;font-size:14.5px;padding:12px 15px}
  .nb{padding:13px 20px;font-size:14.5px}
  .ia{padding:12px 16px 14px}
  .cpl{padding:48px 18px 50px}
  .cpl h1{font-size:28px}
  .rs{padding:20px 22px}
  .hd{padding:0 18px}
}
@media(hover:none){
  .btn:hover,.sb:hover,.nb:hover,.btn3:hover,.btn2:hover,.backBtn:hover,.rs:hover{transform:none;box-shadow:initial}
  .btn:hover{box-shadow:var(--sh-y)}
  .sb:hover{box-shadow:var(--sh-y)}
  .btn3:hover{box-shadow:var(--sh-y)}
  .rs:hover{box-shadow:var(--sh-sm)}
}
</style>
</head>
<body>
<header class="hd">
  <div class="logo"><em>收钱吧</em></div>
  <div class="steps" id="steps"></div>
</header>
<div class="pb"><div class="pf" id="pf" style="width:0%"></div></div>
<main class="main" id="app"></main>
<div class="toast" id="toast"></div>

<script>
// ── CONFIG ────────────────────────────────────────────────
// 在此填入配置（或让学员在设置页输入）
const PRESET = {
  apiBase: 'https://api.deepseek.com',
  apiKey:  'sk-a70c9fa165e848e2938bdc376f06fa77',
  feishu:  'https://open.feishu.cn/open-apis/bot/v2/hook/6c2e4765-9a7c-4f51-873e-64e985f8faa5',
};

// ── STATE ─────────────────────────────────────────────────
const S = {
  screen: 'setup',
  name: '', biz: '',
  apiBase: PRESET.apiBase,
  apiKey:  PRESET.apiKey,
  feishu:  PRESET.feishu,
  section: 0,
  busy: false,
  d: {},
};
for (let i = 1; i <= 6; i++)
  S.d[i] = { msgs: [], out: '', done: false, extra: '', turns: 0, draft: '', extraDraft: '', inputs: {}, inputsSubmitted: false };

// ── SECTION META ──────────────────────────────────────────
const META = {
  1: { name:'第一性原理',    desc:'剥离产品表象，找到你创业的本质驱动力', type:'chat', maxTurns:3, donePattern:/你的第一性原理不是/ },
  2: { name:'使命愿景价值观', desc:'将第一性原理转化为公司的战略罗盘',     type:'chat', maxTurns:2, donePattern:/使命(（Mission）|\s*[:：])/ },
  3: { name:'内在恐惧',      desc:'挖掘商业卡点背后隐藏的核心恐惧',       type:'chat', maxTurns:4, needExtra:true, extraLabel:'你目前遇到的商业卡点', extraHint:'例：我明知要让客户付费，却每次话到嘴边又咽回去…', donePattern:/核心恐惧底牌/ },
  4: { name:'用户洞察',      desc:'从客户视角深度洞察真实购买动机',        type:'gen',
       submitText:'生成用户洞察',
       inputFields:[
         { key:'biz',     label:'你的行业 / 初步产品方向', hint:'课堂讨论后可在此修改', height:100, default:() => S.biz },
         { key:'profile', label:'核心目标客户画像',         hint:'例：一位年入百万但极度焦虑子女教育的35岁海淀妈妈 / 一位面临现金流断裂危机的传统制造业老板', height:130, default:() => S.d[4].extra || '' },
       ] },
  5: { name:'原型重塑',      desc:'将产品从功能级重塑为精神级原型',        type:'gen',
       submitText:'生成原型重塑',
       inputFields:[
         { key:'biz', label:'你的业务/产品描述', hint:'课堂讨论后可在此修改', height:120, default:() => S.biz }
       ] },
  6: { name:'路演讲稿',      desc:'整合所有洞察，生成5分钟路演逐字稿大纲', type:'gen',
       submitText:'生成路演稿',
       inputFields:[
         { key:'biz', label:'业务描述',          hint:'',                       height:80,  default:() => S.biz },
         { key:'p1',  label:'第一性原理',        hint:'课堂讨论后可在此重写',  height:140, default:() => S.d[1].out },
         { key:'p2',  label:'使命愿景价值观',    hint:'课堂讨论后可在此重写',  height:160, default:() => S.d[2].out },
         { key:'p3',  label:'内在恐惧与跨越',    hint:'课堂讨论后可在此重写',  height:160, default:() => S.d[3].out },
         { key:'p4',  label:'用户深度洞察',      hint:'课堂讨论后可在此重写',  height:200, default:() => S.d[4].out },
         { key:'p5',  label:'原型重塑',          hint:'课堂讨论后可在此重写',  height:200, default:() => S.d[5].out },
       ] },
};

// ── PROMPTS ───────────────────────────────────────────────
function sysPrompt(n) {
  if (n === 1) return `你现在是一位犀利的商业哲学家和心理导师。你的目标是帮助用户找到创业的"第一性原理"——剥离所有产品表象后，真正解决的核心痛点或本质价值。

规则（严格执行）：
- 每次只问一个问题，绝不一次问多个
- 遵循"极限剥离"原则，例如：如果明天AI能完全取代你的产品，你还能提供什么？
- 用户告诉你职业后，立刻开始第一个问题
- 共问3轮，不多不少
- 用户回答第3个问题后，立即输出结论，格式严格如下：
"原来，你的第一性原理不是【表面的业务】，而是【底层的本质】。本质上，你是一个【重新定义的身份/角色】。即使【现在的产品/行业】消失，你也依然在【你真正捍卫的价值】。"

语气：犀利、严肃、直击灵魂。`;

  if (n === 2) return `你现在是一位极其冷酷、极具战略眼光的商业合伙人。

已知第一性原理：${S.d[1].out}

你需要通过2个极限压力测试问题，帮助提炼使命、愿景和价值观。

规则（严格执行）：
- 共问2个问题，一次只问一个，等用户回答后再问下一个
- 问题1（终局测试）：假设10年后完全贯彻第一性原理并取得绝对成功，那时的世界/行业因我们的存在发生了什么具象改变？我们的客户每天在过怎样的生活？
- 问题2（流血测试）：价值观不是用来赚钱的，是用来亏钱的。假设明天有个机会能赚1000万但必须违背第一性原理——你宁可公司倒闭也绝对不会去做的那件事是什么？给出具体场景。
- 用户回答第2个问题后，立即输出：
  使命（Mission）：[动宾结构，极简有力]
  愿景（Vision）：[一幅激动人心的蓝图]
  核心价值观（Values）：[3条，用"即使...也必须..."的取舍句式]

直接问第一个问题，不要铺垫。`;

  if (n === 3) return `你现在是一位犀利、懂人性的商业心理侧写师。

用户的商业卡点：${S.d[3].extra}

用"四步剥洋葱法"通过4个连续问题挖出核心恐惧：

// ── API ───────────────────────────────────────────────────
async function claude(messages, system) {
  const base = S.apiBase.replace(/\/$/, '');
  const isAnthropic = base.includes('anthropic.com');

  let url, headers, body;

  if (isAnthropic) {
    // Anthropic 格式
    url = base + '/v1/messages';
    headers = {
      'Content-Type': 'application/json',
      'x-api-key': S.apiKey,
      'anthropic-version': '2023-06-01',
    };
    body = { model: 'claude-sonnet-4-6', max_tokens: 2048, messages };
    if (system) body.system = system;
  } else {
    // OpenAI 兼容格式（DeepSeek / 其他）
    url = base + '/v1/chat/completions';
    headers = {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + S.apiKey,
    };
    const msgs = system
      ? [{ role: 'system', content: system }, ...messages]
      : messages;
    body = { model: 'deepseek-chat', max_tokens: 2048, messages: msgs };
  }

  const r = await fetch(url, { method:'POST', headers, body: JSON.stringify(body) });
  if (!r.ok) {
    const e = await r.json().catch(() => ({}));
    throw new Error(e.error?.message || `HTTP ${r.status}`);
  }
  const data = await r.json();
  // 兼容两种响应格式
  return isAnthropic ? data.content[0].text : data.choices[0].message.content;
}

// ── SECTION LOGIC ─────────────────────────────────────────
async function startChat(n) {
  const sec = S.d[n];
  if (sec.msgs.length) return;
  S.busy = true; render();

  const initMsg = n === 1
    ? `我的职业/业务是：${S.biz}`
    : '开始吧';

  sec.msgs.push({ role:'user', content: initMsg });
  try {
    const reply = await claude(sec.msgs, sysPrompt(n));
    sec.msgs.push({ role:'assistant', content: reply });
  } catch(e) { toast('API 错误: ' + e.message); sec.msgs = []; }
  S.busy = false; render();
}

async function userSays(n, text) {
  const sec = S.d[n];
  const meta = META[n];
  sec.turns++;
  const isFinal = sec.turns >= meta.maxTurns;
  const content = isFinal ? text + '\n\n（这是我的最后一个回答，请现在输出你的最终总结/结论。）' : text;
  sec.msgs.push({ role:'user', content });
  S.busy = true; render();

  try {
    const reply = await claude(sec.msgs, sysPrompt(n));
    sec.msgs.push({ role:'assistant', content: reply });
    const looksFinal = meta.donePattern && meta.donePattern.test(reply);
    if (isFinal || looksFinal) { sec.out = reply; sec.done = true; }
  } catch(e) { toast('API 错误: ' + e.message); sec.msgs.pop(); }
  S.busy = false; render();
}

async function runGen(n) {
  if (S.d[n].done || S.busy) return;
  S.busy = true; render();
  try {
    const reply = await claude([{ role:'user', content: genPrompt(n) }], '');
    S.d[n].out = reply; S.d[n].done = true;
  } catch(e) { toast('API 错误: ' + e.message); }
  S.busy = false; render();
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3000);
}

function fmt(t) {
  return (t||'')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\n/g,'<br>')
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/【(.*?)】/g,'<strong>【$1】</strong>');
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function sectionHeader(n, meta) {
  return `<div class="sh">

  const n = S.section;

  ).join('');

  }

  if (meta.inputFields && !sec.inputsSubmitted) {
    const fields = meta.inputFields.map(f => {
      const cur = (sec.inputs && sec.inputs[f.key] !== undefined) ? sec.inputs[f.key] : f.default();

  }

  // Gen sections loading/done
  if (meta.type === 'gen') {
    if (!sec.done) {
      return `<div class="chat fi">
        ${sectionHeader(n, meta)}
        ${n > 1 ? ctxCard(n) : ''}
        <div class="gl"><div class="ld"><div class="ld-d"></div><div class="ld-d"></div><div class="ld-d"></div></div><p>AI 正在深度分析，请稍候…</p></div>

    }
    const isLast = n === 6;
    return `<div class="chat fi">
      ${sectionHeader(n, meta)}

  }

  // Chat sections
  const visibleMsgs = sec.msgs.slice(1); // hide initial trigger msg

    // Strip our hidden instruction suffix from display
    const txt = m.content.replace(/\n\n（这是我的最后一个回答.*?）$/, '');
    return `<div class="msg ${isU?'u':'ai'}">
      <div class="av">${isU ? S.name.slice(0,1) : '✦'}</div>
      <div class="bub">${fmt(txt)}</div>
    </div>`;
  }).join('');

  const loading = S.busy ? `<div class="msg ai"><div class="av">✦</div><div class="ld"><div class="ld-d"></div><div class="ld-d"></div><div class="ld-d"></div></div></div>` : '';

  const inputArea = (!sec.done && !S.busy)
    ? `<div class="ia"><div class="ic">

      </div></div>` : '';

  return `<div class="chat fi">
    ${sectionHeader(n, meta)}
    ${ctxCard(n)}

function ctxCard(n) {
  if (n === 1) return `<div class="ctx"><strong>你的业务</strong>${S.biz}</div>`;

  if (n === 4) {

  return '';

// ── AUTO-TRIGGER ──────────────────────────────────────────
function scheduleAutoStart() {
  if (S.busy) return;
  const n = S.section;
  const meta = META[n];
  const sec = S.d[n];
  // Module 3 needs single-field extra input first — wait for user to submit
  if (n === 3 && !sec.extra) return;
  // Sections with multi-field input form — wait for user to submit
  if (meta.inputFields && !sec.inputsSubmitted) return;
  if (meta.type === 'chat' && !sec.msgs.length) {
    setTimeout(() => startChat(n), 100);
  } else if (meta.type === 'gen' && !sec.done) {
    setTimeout(() => runGen(n), 100);
  }
}

window.doExtra = (n) => {
  const txt = (document.getElementById('iExtra')?.value||'').trim();
  if (!txt) { toast('请填写内容'); return; }
  S.d[n].extra = txt;
  if (META[n].type === 'chat') startChat(n);
  else runGen(n);
  render();
};

window.doSend = (n) => {
  const txt = (document.getElementById('ci')?.value||'').trim();
  if (!txt||S.busy) return;
  document.getElementById('ci').value = '';
  S.d[n].draft = '';
  userSays(n, txt);
};

window.saveDraft = (field, v) => {
  const n = S.section;
  if (!S.d[n]) return;
  if (field === 'ci') S.d[n].draft = v;
  else if (field === 'iExtra') S.d[n].extraDraft = v;
};

window.saveInputDraft = (n, key, v) => {
  if (!S.d[n].inputs) S.d[n].inputs = {};
  S.d[n].inputs[key] = v;
};

window.submitInputs = (n) => {
  const meta = META[n];
  const sec = S.d[n];
  if (!sec.inputs) sec.inputs = {};
  for (const f of meta.inputFields) {
    const el = document.getElementById('iIn_' + f.key);
    if (el) sec.inputs[f.key] = el.value.trim();
  }
  sec.inputsSubmitted = true;
  if (meta.type === 'gen') runGen(n);
  else startChat(n);
  render();
};

function saveDrafts() {
  const n = S.section;
  if (!S.d[n]) return;
  const ci = document.getElementById('ci');
  const iExtra = document.getElementById('iExtra');
  if (ci) S.d[n].draft = ci.value;
  if (iExtra) S.d[n].extraDraft = iExtra.value;
  const meta = META[n];
  if (meta && meta.inputFields) {
    if (!S.d[n].inputs) S.d[n].inputs = {};
    for (const f of meta.inputFields) {
      const el = document.getElementById('iIn_' + f.key);
      if (el) S.d[n].inputs[f.key] = el.value;
    }
  }
}

window.onKey = (e, n) => {
  if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); doSend(n); }
};

window.autoH = (el) => {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 140) + 'px';
};

window.doNext = () => {
  if (S.busy) return;
  saveDrafts();
  const next = S.section + 1;
  if (next > 6) { doComplete(); return; }
  S.section = next;
  render();
};

window.doBack = () => {
  if (S.busy) return;
  saveDrafts();
  const prev = S.section - 1;
  if (prev < 1) return;
  S.section = prev;
  render();
};

window.doComplete = () => { S.screen='complete'; render(); };
window.sendFeishu = sendFeishu;
window.copyAll = copyAll;

// ── INIT ──────────────────────────────────────────────────
render();
</script>
</body>
</html>
